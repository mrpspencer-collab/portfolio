  <text x="12"  y="198" font-family="monospace" font-size="11" fill="white" opacity="0.20">.filter(c =&gt; c.colorBlind.safe);</text>
  <text x="12"  y="214" font-family="monospace" font-size="11" fill="white" opacity="0.26">await claude.complete(systemPrompt);</text>
  <text x="12"  y="230" font-family="monospace" font-size="11" fill="white" opacity="0.18">export const tools = [maker, sim, guide];</text>

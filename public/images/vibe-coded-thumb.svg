  <text x="12"  y="342" font-family="monospace" font-size="11" fill="white" opacity="0.24">export default GuidedAnalysis;</text>
  <text x="12"  y="358" font-family="monospace" font-size="11" fill="white" opacity="0.15">  vizType: inferViz(question),</text>

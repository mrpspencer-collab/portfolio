name: Build & Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Write SSH key
        env:
          SSH_KEY: ${{ secrets.PORTFOLIOKEY }}
        shell: python3
        run: |
          import os, stat
          key = os.environ['SSH_KEY'].strip().replace('\r\n', '\n').replace('\r', '\n')
          os.makedirs(os.path.expanduser('~/.ssh'), exist_ok=True)
          path = os.path.expanduser('~/.ssh/id_rsa')
          with open(path, 'w') as f:
              f.write(key + '\n')
          os.chmod(path, stat.S_IRUSR | stat.S_IWUSR)

      - name: Validate key
        run: ssh-keygen -l -f ~/.ssh/id_rsa

      - name: Deploy to SiteGround
        run: |
          ssh-keyscan -p 18765 ssh.paulamsbary.com >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --delete \
            -e "ssh -p 18765 -i ~/.ssh/id_rsa" \
            dist/ u253-znw4txwqk8kk@ssh.paulamsbary.com:${{ secrets.DEPLOY_PATH }}/

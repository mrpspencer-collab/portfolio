name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy files (preserve images)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude '/images/'
          path: dist/
          remote_path: www/paulamsbary.com/public_html/
          remote_host: ssh.paulamsbary.com
          remote_port: 18765
          remote_user: u253-znw4txwqk8kk
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy images (no delete)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz
          path: dist/images/
          remote_path: www/paulamsbary.com/public_html/images/
          remote_host: ssh.paulamsbary.com
          remote_port: 18765
          remote_user: u253-znw4txwqk8kk
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

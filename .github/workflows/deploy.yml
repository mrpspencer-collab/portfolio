name: Build & Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy to SiteGround
        env:
          SSH_KEY: ${{ secrets.PORTFOLIOKEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 18765 ssh.paulamsbary.com >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --delete \
            -e "ssh -p 18765 -i ~/.ssh/id_rsa" \
            dist/ u253-znw4txwqk8kk@ssh.paulamsbary.com:${{ secrets.DEPLOY_PATH }}/

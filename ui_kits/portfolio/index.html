<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paul Amsbary — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  [data-theme="light"] {
    --bg: #F7F5F0; --bg-surface: #FFFFFF; --bg-muted: #EDE9E2; --bg-subtle: #E2DDD6;
    --fg: #0F0D0A; --fg-muted: #6B6660; --fg-subtle: #9A9590; --fg-disabled: #D4CEC6;
    --accent: #C07A3A; --accent-hover: #A86428; --accent-fg: #FFFFFF;
    --border: #E2DDD6; --border-strong: #B8B2A9;
    --shadow-md: 0 2px 8px rgba(15,13,10,0.08), 0 1px 2px rgba(15,13,10,0.04);
    --shadow-lg: 0 8px 24px rgba(15,13,10,0.10), 0 2px 6px rgba(15,13,10,0.06);
  }

  [data-theme="dark"] {
    --bg: #0F0D0A; --bg-surface: #1A1713; --bg-muted: #242018; --bg-subtle: #302C28;
    --fg: #F7F5F0; --fg-muted: #9A9590; --fg-subtle: #5A5550; --fg-disabled: #4A4540;
    --accent: #D4904E; --accent-hover: #E8A86A; --accent-fg: #0F0D0A;
    --border: #2A2520; --border-strong: #4A4540;
    --shadow-md: 0 2px 8px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.2);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.5), 0 2px 6px rgba(0,0,0,0.3);
  }

  html, body, #root {
    height: 100%;
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }
  body { background: var(--bg); color: var(--fg); transition: background 0.3s, color 0.3s; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
</style>
</head>
<body data-theme="light">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

/* ── DATA ─────────────────────────────────────────── */
const PROJECTS = [
  {
    id: 'atlas',
    title: 'ATLAS',
    subtitle: 'Designing Intelligent Workflows',
    tags: ['AI / ML', 'Product Design', '2025'],
    status: 'Shipping in beta',
    thumb: null,
    thumbBg: '#1A1713',
    thumbText: 'ATLAS',
    thumbTextColor: '#5A5550',
    body: 'Led end-to-end UX design to evolve Atlas from traditional BI dashboards to AI-driven workflows that analyze data and push insights directly to business stakeholders. Designed and shipped production-ready experiences that made complex data easier to understand and act on.',
    metrics: [],
    cta: 'Read Case Study',
  },
  {
    id: 'coursera-clips',
    title: 'Coursera Clips',
    subtitle: 'Short Form Content Redesign',
    tags: ['UX Design', 'Enterprise', '2024'],
    status: null,
    thumb: 'https://paulamsbary.com/wp-content/uploads/2025/11/mbip-clips.png',
    thumbBg: '#EDE9E2',
    thumbText: 'Coursera Clips',
    thumbTextColor: '#7C7771',
    body: "Modernized Coursera's Clips experience, increasing video consumption, continuation rates, and course enrollments, unlocking new enterprise wins and long-term revenue.",
    metrics: ['+23% video starts', 'Gains in enrollment', '+99% continue watching'],
    cta: 'Explore the case study',
  },
  {
    id: 'coursera-day1',
    title: 'Coursera Learning Experience',
    subtitle: 'Day 1 Commitment',
    tags: ['Behavioral Design', 'Research', '2023'],
    status: null,
    thumb: 'https://paulamsbary.com/wp-content/uploads/2025/06/Step-1-make-a-committment-weekly-goal-3-scaled.jpg',
    thumbBg: '#D4CEC6',
    thumbText: 'Day 1',
    thumbTextColor: '#6B6660',
    body: "As enrollments normalized post-pandemic, Coursera faced a critical challenge: learners were signing up but not sticking with their courses long enough to see results. My work focused on shifting our retention strategy away from one-size-fits-all nudges toward behavioral science-informed design.",
    metrics: ['+3% Day 1 engagement', 'Reduced time to value', 'Improved push strategy'],
    cta: 'Explore the case study',
  },
  {
    id: 'coursera-biz',
    title: 'Coursera for Business',
    subtitle: 'Enterprise Website Redesign',
    tags: ['Enterprise', 'Web Design', '2023'],
    status: null,
    thumb: 'https://paulamsbary.com/wp-content/uploads/2025/11/coursera-for-business-scaled.png',
    thumbBg: '#B8B2A9',
    thumbText: 'Coursera Biz',
    thumbTextColor: '#4A4540',
    body: "Coursera's Business, Campus, and Government sites were reimagined into a unified, user-centered platform to better speak to enterprise buyers and drive growth.",
    metrics: ['+20% MQL lift', 'Adaptable content model', 'Streamlined navigation'],
    cta: 'Explore the case study',
  },
  {
    id: 'disney',
    title: 'Disney+',
    subtitle: 'Offline Viewing',
    tags: ['Streaming', 'Prototyping', '2020'],
    status: null,
    thumb: 'https://paulamsbary.com/wp-content/uploads/2021/04/journey-map-large.jpg',
    thumbBg: '#0B1120',
    thumbText: 'Disney+',
    thumbTextColor: '#4A5570',
    body: 'Defined the early offline viewing experience for Disney+ by leading foundational research, mapping download and device-storage behaviors, and prototyping the key flows for finding, downloading, and managing content.',
    metrics: [],
    cta: 'Explore the case study',
  },
  {
    id: 'nhl',
    title: 'NHL.tv',
    subtitle: 'Team Home',
    tags: ['Streaming', 'UX Design', '2021'],
    status: null,
    thumb: 'https://paulamsbary.com/wp-content/uploads/2021/08/team-home-thumb.png',
    thumbBg: '#0D1B2A',
    thumbText: 'NHL.tv',
    thumbTextColor: '#3A5070',
    body: "Defined and designed NHL.tv's transition to a team-centric streaming experience, leading user research, interaction design, IA, and production-ready UI across connected devices.",
    metrics: [],
    cta: 'Explore the case study',
  },
];

/* ── SHARED STYLES ──────────────────────────────────── */
const S = {
  nav: {
    position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    padding: '0 40px', height: 64,
    borderBottom: '1px solid var(--border)',
    background: 'var(--bg)',
    transition: 'background 0.3s, border-color 0.3s',
  },
  logo: {
    fontFamily: 'var(--font-display)', fontSize: 17, fontWeight: 700,
    letterSpacing: '-0.025em', color: 'var(--fg)', textDecoration: 'none', cursor: 'pointer',
  },
  navLinks: { display: 'flex', alignItems: 'center', gap: 8 },
  navLink: (active) => ({
    fontFamily: 'var(--font-body)', fontSize: 13, fontWeight: 500,
    color: active ? 'var(--fg)' : 'var(--fg-muted)',
    padding: '6px 12px', cursor: 'pointer', borderRadius: 0,
    background: 'none', border: 'none',
    textDecoration: 'none', transition: 'color 0.15s',
    borderBottom: active ? '1.5px solid var(--accent)' : '1.5px solid transparent',
  }),
  btn: (variant = 'primary', size = 'md') => {
    const sizes = {
      sm: { fontSize: 12, padding: '7px 14px' },
      md: { fontSize: 13, padding: '9px 18px' },
      lg: { fontSize: 15, padding: '12px 26px' },
    };
    const variants = {
      primary: { background: 'var(--fg)', color: 'var(--bg)' },
      accent:  { background: 'var(--accent)', color: 'var(--accent-fg)' },
      outline: { background: 'transparent', color: 'var(--fg)', border: '1px solid var(--border-strong)' },
      ghost:   { background: 'transparent', color: 'var(--fg-muted)', border: 'none' },
    };
    return {
      ...sizes[size], ...variants[variant],
      fontFamily: 'var(--font-body)', fontWeight: 500,
      cursor: 'pointer', borderRadius: 0,
      transition: 'all 0.18s',
      display: 'inline-flex', alignItems: 'center', gap: 6,
      border: variants[variant].border || 'none',
    };
  },
  tag: (variant = 'default') => {
    const v = {
      default: { background: 'var(--bg-muted)', color: 'var(--fg-muted)' },
      accent:  { background: 'rgba(192,122,58,0.12)', color: 'var(--accent)', border: '1px solid rgba(192,122,58,0.25)' },
    };
    return { ...v[variant], fontFamily: 'var(--font-body)', fontSize: 11, fontWeight: 500, padding: '3px 8px', borderRadius: 4, whiteSpace: 'nowrap' };
  },
};

/* ── COMPONENTS ─────────────────────────────────────── */
function ThemeToggle({ theme, onToggle }) {
  return (
    <button
      onClick={onToggle}
      style={{ ...S.btn('ghost', 'sm'), fontSize: 12, padding: '6px 12px', color: 'var(--fg-muted)', border: '1px solid var(--border)', borderRadius: 4 }}
    >
      {theme === 'light' ? '◐ Dark' : '◑ Light'}
    </button>
  );
}

function Nav({ page, setPage, theme, toggleTheme }) {
  return (
    <nav style={S.nav}>
      <span style={S.logo} onClick={() => setPage('home')}>Paul Amsbary</span>
      <div style={S.navLinks}>
        <button style={S.navLink(page === 'home' || page === 'project')} onClick={() => setPage('home')}>Work</button>
        <button style={S.navLink(page === 'about')} onClick={() => setPage('about')}>About</button>
        <div style={{ width: 1, height: 20, background: 'var(--border)', margin: '0 8px' }} />
        <ThemeToggle theme={theme} onToggle={toggleTheme} />
        <a href="#" style={{ ...S.btn('primary', 'sm'), textDecoration: 'none', marginLeft: 8 }}>Download Resume</a>
      </div>
    </nav>
  );
}

function Tag({ children, variant }) {
  return <span style={S.tag(variant)}>{children}</span>;
}

function ProjectCard({ project, onClick }) {
  const [hovered, setHovered] = useState(false);
  return (
    <div
      onClick={() => onClick(project)}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        background: 'var(--bg-surface)',
        border: '1px solid var(--border)',
        borderRadius: 8,
        overflow: 'hidden',
        cursor: 'pointer',
        transform: hovered ? 'translateY(-3px)' : 'translateY(0)',
        boxShadow: hovered ? 'var(--shadow-lg)' : 'var(--shadow-md)',
        transition: 'transform 0.22s ease, box-shadow 0.22s ease',
      }}
    >
      <div style={{
        height: 200,
        background: project.thumbBg,
        overflow: 'hidden',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        fontFamily: 'var(--font-mono)',
        fontSize: 12,
        color: project.thumbTextColor,
      }}>
        {project.thumb
          ? <img src={project.thumb} alt={project.title} style={{ width: '85%', height: '85%', objectFit: 'contain', display: 'block' }} />
          : project.thumbText}
      </div>
      <div style={{ padding: '20px 22px' }}>
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 10 }}>
          {project.tags.map(t => <Tag key={t}>{t}</Tag>)}
          {project.status && <Tag variant="accent">{project.status}</Tag>}
        </div>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 19, fontWeight: 700, lineHeight: 1.15, letterSpacing: '-0.02em', color: 'var(--fg)', marginBottom: 4 }}>
          {project.title}
        </div>
        <div style={{ fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 500, color: 'var(--fg-muted)', marginBottom: 10 }}>
          {project.subtitle}
        </div>
        {project.metrics.length > 0 && (
          <ul style={{ paddingLeft: 0, listStyle: 'none', marginBottom: 12 }}>
            {project.metrics.map(m => (
              <li key={m} style={{ fontSize: 12, color: 'var(--fg-muted)', lineHeight: 1.6, display: 'flex', alignItems: 'flex-start', gap: 6 }}>
                <span style={{ color: 'var(--accent)', fontWeight: 600 }}>+</span>{m}
              </li>
            ))}
          </ul>
        )}
        <span style={{ fontSize: 13, fontWeight: 500, color: 'var(--accent)' }}>{project.cta} →</span>
      </div>
    </div>
  );
}

/* ── PAGES ───────────────────────────────────────────── */
function HomePage({ setPage, setProject }) {
  const handleClick = (p) => { setProject(p); setPage('project'); };
  return (
    <div style={{ paddingTop: 64 }}>
      {/* Hero */}
      <section style={{ maxWidth: 1200, margin: '0 auto', padding: '96px 40px 80px' }}>
        <div style={{ fontFamily: 'var(--font-body)', fontSize: 11, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--fg-subtle)', marginBottom: 20 }}>
          UX Design · Research · Leadership
        </div>
        <h1 style={{ fontFamily: 'var(--font-display)', fontSize: 'clamp(40px, 5vw, 72px)', fontWeight: 700, lineHeight: 1.05, letterSpacing: '-0.04em', color: 'var(--fg)', maxWidth: 700, marginBottom: 28 }}>
          I strive to design experiences that connect people.
        </h1>
        <p style={{ fontFamily: 'var(--font-body)', fontSize: 18, lineHeight: 1.65, color: 'var(--fg-muted)', maxWidth: 540, marginBottom: 36 }}>
          Throughout my career, I've led design and research teams while staying hands-on. Teaching is core to my practice.
        </p>
        <div style={{ display: 'flex', gap: 12 }}>
          <a href="#" style={{ ...S.btn('primary', 'lg'), textDecoration: 'none' }}>Download Resume</a>
          <a href="#" style={{ ...S.btn('outline', 'lg'), textDecoration: 'none' }}>Connect on LinkedIn</a>
        </div>
      </section>

      {/* Divider */}
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 40px' }}>
        <div style={{ height: 1, background: 'var(--border)' }} />
      </div>

      {/* Work grid */}
      <section style={{ maxWidth: 1200, margin: '0 auto', padding: '64px 40px 96px' }}>
        <div style={{ fontFamily: 'var(--font-body)', fontSize: 11, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--fg-subtle)', marginBottom: 32 }}>
          Selected Work
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(320px, 1fr))', gap: 20 }}>
          {PROJECTS.map(p => <ProjectCard key={p.id} project={p} onClick={handleClick} />)}
        </div>
      </section>
    </div>
  );
}

function ProjectPage({ project, setPage }) {
  return (
    <div style={{ paddingTop: 64 }}>
      {/* Breadcrumb */}
      <div style={{ borderBottom: '1px solid var(--border)', padding: '12px 40px', display: 'flex', alignItems: 'center', gap: 8 }}>
        <button onClick={() => setPage('home')} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 12, color: 'var(--fg-muted)', fontFamily: 'var(--font-body)' }}>
          Work
        </button>
        <span style={{ fontSize: 12, color: 'var(--fg-subtle)' }}>→</span>
        <span style={{ fontSize: 12, color: 'var(--fg)', fontFamily: 'var(--font-body)', fontWeight: 500 }}>{project.title}</span>
      </div>

      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 40px' }}>
        {/* Thumb */}
        <div style={{
          height: 360,
          background: project.thumbBg,
          overflow: 'hidden',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          margin: '40px 0',
          borderRadius: 8,
          fontFamily: 'var(--font-mono)',
          fontSize: 14,
          color: project.thumbTextColor,
        }}>
          {project.thumb
            ? <img src={project.thumb} alt={project.title} style={{ width: '85%', height: '85%', objectFit: 'contain', display: 'block' }} />
            : `${project.title} — ${project.subtitle}`}
        </div>

        {/* Content */}
        <div style={{ maxWidth: 680, paddingBottom: 96 }}>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 16 }}>
            {project.tags.map(t => <Tag key={t}>{t}</Tag>)}
            {project.status && <Tag variant="accent">{project.status}</Tag>}
          </div>
          <div style={{ fontFamily: 'var(--font-body)', fontSize: 11, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--fg-subtle)', marginBottom: 10 }}>
            {project.title}
          </div>
          <h1 style={{ fontFamily: 'var(--font-display)', fontSize: 44, fontWeight: 700, lineHeight: 1.1, letterSpacing: '-0.03em', color: 'var(--fg)', marginBottom: 24 }}>
            {project.subtitle}
          </h1>
          <p style={{ fontSize: 17, lineHeight: 1.7, color: 'var(--fg-muted)', marginBottom: 32 }}>{project.body}</p>

          {project.metrics.length > 0 && (
            <div style={{ background: 'var(--bg-muted)', border: '1px solid var(--border)', borderRadius: 8, padding: '24px 28px', marginBottom: 36 }}>
              <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--fg-subtle)', marginBottom: 16 }}>
                Outcomes
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {project.metrics.map(m => (
                  <div key={m} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                    <span style={{ fontFamily: 'var(--font-mono)', fontSize: 20, fontWeight: 500, color: 'var(--accent)' }}>
                      {m.startsWith('+') ? m.split(' ')[0] : '→'}
                    </span>
                    <span style={{ fontSize: 14, color: 'var(--fg-muted)' }}>
                      {m.startsWith('+') ? m.slice(m.indexOf(' ') + 1) : m}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={{ display: 'flex', gap: 12 }}>
            <button style={S.btn('primary', 'md')}>{project.cta} →</button>
            <button onClick={() => setPage('home')} style={S.btn('ghost', 'md')}>← Back to Work</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function AboutPage() {
  return (
    <div style={{ paddingTop: 64 }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '80px 40px 96px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80, alignItems: 'start' }}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--fg-subtle)', marginBottom: 16 }}>About</div>
          <h1 style={{ fontFamily: 'var(--font-display)', fontSize: 52, fontWeight: 700, lineHeight: 1.05, letterSpacing: '-0.04em', color: 'var(--fg)', marginBottom: 28 }}>
            Paul Amsbary
          </h1>
          <p style={{ fontSize: 17, lineHeight: 1.7, color: 'var(--fg-muted)', marginBottom: 24 }}>
            I strive to design experiences that connect people, spark meaningful rituals, and encourage growth. Throughout my career, I've led design and research teams while staying hands-on.
          </p>
          <p style={{ fontSize: 17, lineHeight: 1.7, color: 'var(--fg-muted)', marginBottom: 36 }}>
            Teaching is core to my practice, with experience as an instructor, course creator, and mentor.
          </p>
          <div style={{ display: 'flex', gap: 12 }}>
            <a href="#" style={{ ...S.btn('primary', 'md'), textDecoration: 'none' }}>Download Resume</a>
            <a href="#" style={{ ...S.btn('outline', 'md'), textDecoration: 'none' }}>LinkedIn →</a>
          </div>
        </div>
        <div>
          <div style={{ background: 'var(--bg-muted)', border: '1px solid var(--border)', borderRadius: 8, padding: '32px', marginBottom: 20 }}>
            <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--fg-subtle)', marginBottom: 16 }}>Experience</div>
            {[
              ['ATLAS',            'Lead UX Designer',   '2024–Present'],
              ['Coursera',         'Senior UX Designer', '2021–2024'],
              ['Disney Streaming', 'UX Designer',        '2019–2021'],
              ['NHL Digital',      'UX Designer',        '2018–2019'],
            ].map(([co, role, yr]) => (
              <div key={co} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', paddingBottom: 14, marginBottom: 14, borderBottom: '1px solid var(--border)' }}>
                <div>
                  <div style={{ fontFamily: 'var(--font-display)', fontSize: 15, fontWeight: 600, color: 'var(--fg)' }}>{co}</div>
                  <div style={{ fontSize: 13, color: 'var(--fg-muted)', marginTop: 2 }}>{role}</div>
                </div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--fg-subtle)' }}>{yr}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function Footer({ setPage }) {
  return (
    <footer style={{ borderTop: '1px solid var(--border)', padding: '24px 40px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', maxWidth: 1200, margin: '0 auto' }}>
      <span style={{ fontSize: 12, color: 'var(--fg-subtle)', fontFamily: 'var(--font-body)' }}>© 2026 Paul Amsbary</span>
      <div style={{ display: 'flex', gap: 24 }}>
        {['LinkedIn', 'Resume', 'Contact'].map(l => (
          <a key={l} href="#" style={{ fontSize: 12, color: 'var(--fg-muted)', textDecoration: 'none', fontFamily: 'var(--font-body)' }}>{l}</a>
        ))}
      </div>
    </footer>
  );
}

/* ── APP ─────────────────────────────────────────────── */
function App() {
  const [theme, setTheme]     = useState(() => localStorage.getItem('pa-theme') || 'light');
  const [page, setPage]       = useState('home');
  const [project, setProject] = useState(null);

  useEffect(() => {
    document.body.setAttribute('data-theme', theme);
    localStorage.setItem('pa-theme', theme);
  }, [theme]);

  const toggleTheme = () => setTheme(t => t === 'light' ? 'dark' : 'light');
  const handleSetPage = (p) => { setPage(p); window.scrollTo({ top: 0 }); };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <Nav page={page} setPage={handleSetPage} theme={theme} toggleTheme={toggleTheme} />
      <main style={{ flex: 1 }}>
        {page === 'home'    && <HomePage setPage={handleSetPage} setProject={setProject} />}
        {page === 'project' && project && <ProjectPage project={project} setPage={handleSetPage} />}
        {page === 'about'   && <AboutPage />}
      </main>
      <Footer setPage={handleSetPage} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
